<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bientôt Disponible — ghali.cloud</title>
    <meta name="description" content="Le blog ghali.cloud arrive bientôt. Restez informé sur l'actualité de l'intelligence artificielle et nos solutions.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ghali.cloud/comingsoon.html">
    
    <link rel="icon" type="image/png" href="assets/Gcloud.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="logo">
            <img src="assets/Gcloud.png" alt="ghali.cloud" width="55" height="36">
        </a>
        <ul class="nav-links">
            <li><a href="index.html#solutions">Solutions</a></li>
            <li><a href="index.html#approach">Approche</a></li>
            <li><a href="index.html#security">Sécurité</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" aria-label="Toggle theme">
                <i data-lucide="moon" class="moon-icon"></i>
                <i data-lucide="sun" class="sun-icon"></i>
            </button>
            <button class="mobile-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="comingsoon-page">
        <div class="container">
            <div class="comingsoon-content">
                <i data-lucide="clock" class="comingsoon-icon"></i>
                <h1>Bientôt Disponible</h1>
                <p>Notre blog est en cours de préparation.</p>
                <p class="comingsoon-subtitle">Restez informé sur les dernières actualités en intelligence artificielle, nos retours d'expérience et nos conseils pour votre transformation digitale.</p>
                <a href="index.html" class="btn-gold btn-back">
                    <i data-lucide="arrow-left"></i> Retour à l'accueil
                </a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>

    <style>
        .comingsoon-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 0;
            background: var(--black);
        }

        .comingsoon-content {
            text-align: center;
            max-width: 500px;
        }

        .comingsoon-icon {
            width: 80px;
            height: 80px;
            color: var(--gold);
            margin-bottom: 32px;
        }

        .comingsoon-content h1 {
            font-size: 2.5rem;
            font-weight: 400;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 16px;
        }

        .comingsoon-content p {
            font-size: 18px;
            color: var(--ash);
            margin-bottom: 12px;
        }

        .comingsoon-subtitle {
            font-size: 14px !important;
            line-height: 1.6;
            margin-bottom: 40px !important;
        }

        .btn-back:hover i,
        .btn-back:hover svg {
            animation: arrowLeft 0.6s ease-out forwards;
        }

        @keyframes arrowLeft {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            50% {
                transform: translate(-10px, 0);
                opacity: 1;
            }
            100% {
                transform: translate(-20px, 0);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
